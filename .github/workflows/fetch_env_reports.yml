name: Fetch Env Reports
on:
  schedule:
    - cron: '0 8 1 * *'  # 1st of each month at 8am UTC
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas google-cloud-bigquery db-dtypes
      - name: Run fetch_env_reports.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python fetch_env_reports.py
