name: Update Akvafakta Power BI data

on:
  schedule:
    - cron: "15 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract public Power BI data
        run: python scripts/extract_akvafakta_powerbi.py --save-raw

      - name: Commit updated CSVs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Akvafakta Power BI data
          file_pattern: akvafakta_powerbi_data/*.csv akvafakta_powerbi_data/*_raw_querydata.json
