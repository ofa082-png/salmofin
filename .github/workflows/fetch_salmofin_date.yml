name: Fetch Salmofin Data

on:
  schedule:
    - cron: '0 6 * * *'  # every day at 06:00 UTC (08:00 Norwegian time)
  workflow_dispatch:      # allows manual run from GitHub website

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install copernicusmarine pandas xarray h5py netCDF4 requests

      - name: Run chlorophyll script
        env:
          CMEMS_USERNAME: ${{ secrets.CMEMS_USERNAME }}
          CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
        run: python cmems_norway_chlorophyll.py

      - name: Run disease zones script
        env:
          BW_CLIENT_ID: ${{ secrets.BW_CLIENT_ID }}
          BW_CLIENT_SECRET: ${{ secrets.BW_CLIENT_SECRET }}
        run: python barentswatch_disease_zones.py

      - name: Commit and push CSVs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add chlorophyll.csv disease_zones.csv
          git diff --staged --quiet || git commit -m "Update data $(date -u '+%Y-%m-%d')"
          git push
